<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" role="img" aria-labelledby="title desc">
  <title id="title">New York Times source image</title>
  <desc id="desc">Black and white editorial tile for The New York Times news source.</desc>
  <rect width="640" height="360" fill="#111111"/>
  <rect x="38" y="38" width="564" height="284" rx="18" fill="#ffffff"/>
  <text x="86" y="158" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700">The New</text>
  <text x="86" y="228" fill="#111111" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="700">York Times</text>
  <line x1="88" x2="552" y1="260" y2="260" stroke="#111111" stroke-width="5"/>
</svg>
